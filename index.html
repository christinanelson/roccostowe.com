<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Rocco Stowe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      display: flex;
      max-width: 1100px;
      width: 100%;
      padding: 40px;
      gap: 40px;
      align-items: center;
    }

    .text {
      flex: 1;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      margin: 0 0 20px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 16px;
    }

    a.button {
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .primary {
      background: white;
      color: black;
    }

    .secondary {
      border: 1px solid #444;
      color: white;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .image {
      flex: 1;
    }

    .image img {
      width: 100%;
      border-radius: 20px;
      object-fit: contain;
      height: auto;
      max-height: 500px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="text">
      <h1>
        Fitness.<br>
        Comedy.<br>
        Presence.
      </h1>

      <p>
        Welcome to Rocco Stowe's official site.
      </p>

      <div class="buttons">
        <a href="/fitness" class="button primary">Fitness</a>
        <a href="/comedy" class="button secondary">Comedy</a>
      </div>
    </div>

    <div class="image">
      <img src="rocco-hero.jpg" alt="Rocco Stowe">
    </div>
  </div>

</body>

</html>
