<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rocco Stowe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #050505;
      color: #f5f5f7;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 32px;
    }

    .hero {
      min-height: calc(100vh - 96px);
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      align-items: center;
      gap: 72px;
    }

    .left {
      max-width: 560px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 8vw, 6.6rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
      font-weight: 500;
    }

    .subtext {
      margin-top: 28px;
      max-width: 500px;
      font-size: 1.05rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.68);
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: #f5f5f7;
      color: #0a0a0a;
      border: 1px solid #f5f5f7;
    }

    .button-primary:hover {
      background: #ffffff;
    }

    .button-secondary {
      background: transparent;
      color: #f5f5f7;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
    }

    .button-secondary:hover {
      border-color: rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.03);
    }

    .right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-shell {
      width: 100%;
      max-width: 620px;
      border-radius: 32px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      padding: 18px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .image-shell img {
      display: block;
      width: 100%;
      max-height: 760px;
      height: auto;
      object-fit: contain;
      object-position: center top;
      border-radius: 22px;
      background: #0d0d0d;
    }
      /* MENU BUTTON */
    .menu-button {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 22px;
      cursor: pointer;
      z-index: 1000;
      color: white;
    }

    /* MENU PANEL */
    .menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(5, 5, 5, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 0;
      gap: 30px;

      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: 500;
    }

    .menu a:hover {
      opacity: 0.7;
    }

    /* ACTIVE STATE */
    .menu.open {
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 42px;
        text-align: center;
      }

      .left {
        max-width: 720px;
        margin: 0 auto;
      }

      .subtext {
        margin-left: auto;
        margin-right: auto;
      }

      .actions {
        justify-content: center;
      }

      .right {
        order: -1;
      }

      .image-shell {
        max-width: 560px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 20px;
      }

      .hero {
        min-height: auto;
      }

      h1 {
        font-size: clamp(2.8rem, 15vw, 4.5rem);
      }

      .subtext {
        font-size: 1rem;
      }

      .button {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<script>
  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.classList.toggle("open");
  }
</script>

<body>
<!-- MENU BUTTON -->
<div class="menu-button" onclick="toggleMenu()">
  ☰
</div>

<!-- MENU PANEL -->
<div id="menu" class="menu">
  <a href="/">Home</a>
  <a href="/fitness">Fitness</a>
  <a href="/comedy">Comedy</a>
</div>
  <div class="page">
    <main class="hero">
      <section class="left">
        <div class="eyebrow">Rocco Stowe</div>

        <h1>
          Fitness.<br>
          Comedy.<br>
          Presence.
        </h1>

        <p class="subtext">
          <p class="subtext">
          Performance, personality, and presence—brought together in one place.
          Explore fitness or comedy.
        </p>

        <div class="actions">
          <a href="/fitness" class="button button-primary">Fitness</a>
          <a href="/comedy" class="button button-secondary">Comedy</a>
        </div>
      </section>

      <section class="right">
        <div class="image-shell">
          <img src="rocco-hero.jpg" alt="Rocco Stowe portrait">
        </div>
      </section>
    </main>
  </div>
</body>
</html>
